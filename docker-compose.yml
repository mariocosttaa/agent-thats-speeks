# Local stack: cp .env.example .env, set GEMINI_API_KEY, then:
#   docker compose up --build
# Frontend (browser) calls API at NEXT_PUBLIC_API_BASE_URL — use host-mapped URL (default http://localhost:8000).

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
